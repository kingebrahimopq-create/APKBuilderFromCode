name: APKBuilder Pro - Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.0'
  ANDROID_API: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  analysis:
    name: Code Analysis & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk: ${{ env.ANDROID_API }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Stop Gradle daemon
        run: ./gradlew --stop

      - name: Clean project
        run: ./gradlew clean --stacktrace --no-daemon

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Run Tests
        run: ./gradlew testDebug --stacktrace --no-daemon

  build:
    name: Build APKs
    runs-on: ubuntu-latest
    needs: analysis
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk: ${{ env.ANDROID_API }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Stop Gradle daemon
        run: ./gradlew --stop

      - name: Clean project
        run: ./gradlew clean --stacktrace --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: -Xmx2048m -Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: -Xmx2048m -Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: Debug APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v3
        with:
          name: Release APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  release:
    name: Release to Play Store
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v3
        with:
          name: Release APK
          path: app/build/outputs/apk/release

      - name: Verify APK exists
        run: ls -la app/build/outputs/apk/release/

      - name: Release to Play Store
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJson: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT }}
          packageName: com.example.apkbuilder
          releaseFiles: app/build/outputs/apk/release/*.apk
          track: production
          userFraction: 1.0
          rollout: 100
