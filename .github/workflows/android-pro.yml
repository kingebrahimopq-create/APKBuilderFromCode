name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # هذه الإضافة تساعد في تسريع البناء وحل مشاكل الملفات التالفة
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      # خطوة سحرية: إذا كان ملف الـ .jar فارغاً، هذا الأمر سيعيد إنشاءه
      - name: Repair Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        
      - name: Verify and Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
