name: APKBuilder Pro - Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_API: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  analysis:
    name: Code Analysis & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk: ${{ env.ANDROID_API }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Run Tests
        run: ./gradlew testDebug --stacktrace --no-daemon

  build:
    name: Build APKs
    runs-on: ubuntu-latest
    needs: analysis
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk: ${{ env.ANDROID_API }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

  release:
    name: Release to Play Store
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release

      - name: Verify APK exists
        run: ls -la app/build/outputs/apk/release/

      - name: Release to Play Store
        uses: r0adkll/upload-google-play@v3
        with:
          serviceAccountJson: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT }}
          packageName: com.example.apkbuilder
          releaseFiles: app/build/outputs/apk/release/*.apk
          track: production
          userFraction: 1.0
          rollout: 100
