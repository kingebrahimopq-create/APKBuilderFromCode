name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "Build tools: $(ls $ANDROID_HOME/build-tools/)"
          echo "Platforms: $(ls $ANDROID_HOME/platforms/)"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon --warning-mode all
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Verify APK was created
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK built successfully!"
            ls -lh app/build/outputs/apk/debug/app-debug.apk
          else
            echo "APK not found!"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
